cursor:pointer;
font-family:inherit;
}

#login-screen{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
background:#FAF7F2;
}

.login-box{
background:#fff;
border-radius:16px;
padding:40px 28px;
width:100%;
max-width:340px;
box-shadow:0 4px 24px rgba(92,26,26,.12);
text-align:center;
}

.brand{
font-family:'Playfair Display',serif;
font-size:22px;
font-weight:700;
color:#5C1A1A;
}

.brand span{
font-family:'Dancing Script',cursive;
color:#C9973A;
}

.sub-label{
font-size:9px;
letter-spacing:3px;
text-transform:uppercase;
color:#8B6555;
font-weight:700;
margin-bottom:28px;
display:block;
margin-top:2px;
}

.field-label{
display:block;
text-align:left;
font-size:9px;
letter-spacing:2px;
text-transform:uppercase;
color:#8B6555;
font-weight:700;
margin-bottom:6px;
}

.field-input{
width:100%;
padding:12px 14px;
border:1.5px solid #DDD0BB;
border-radius:8px;
font-size:14px;
background:#FAF7F2;
outline:none;
}

.btn-login{
width:100%;
margin-top:14px;
padding:14px;
background:#5C1A1A;
color:#fff;
border:none;
border-radius:6px;
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
font-weight:700;
}

#panel-screen{
display:none;
}

.admin-topbar{
background:#5C1A1A;
padding:0 16px;
height:52px;
display:flex;
align-items:center;
justify-content:space-between;
}

.admin-body{
padding:20px 16px 80px;
}

.page-title{
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:700;
color:#5C1A1A;
margin-bottom:20px;
}

.section-card{
background:#fff;
border-radius:12px;
padding:20px;
margin-bottom:16px;
box-shadow:0 2px 8px rgba(92,26,26,.1);
}

.actions-col{
display:flex;
flex-direction:column;
gap:10px;
}

.act-btn{
padding:13px 16px;
border-radius:6px;
font-size:11px;
letter-spacing:1.5px;
text-transform:uppercase;
font-weight:700;
border:none;
}

.act-add{
background:#5C1A1A;
color:#fff;
}

.prod-row{
display:flex;
gap:12px;
align-items:center;
padding:12px 0;
border-bottom:1px solid #DDD0BB;
}

.prod-thumb{
width:56px;
height:56px;
border-radius:10px;
background:#F0E8D8;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
overflow:hidden;
flex-shrink:0;
}

.prod-thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.prod-info{
flex:1;
}

.prod-info h4{
font-family:'Playfair Display',serif;
font-size:14px;
font-weight:600;
margin-bottom:2px;
}

.prod-price{
font-family:'Playfair Display',serif;
font-size:13px;
color:#5C1A1A;
font-weight:700;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
align-items:flex-end;
justify-content:center;
z-index:1000;
}

.overlay.show{
display:flex;
}

.modal-box{
background:#FAF7F2;
border-radius:20px 20px 0 0;
padding:24px 20px 40px;
width:100%;
max-width:480px;
max-height:90vh;
overflow-y:auto;
}

.fld{
margin-bottom:14px;
}

.fld label{
display:block;
font-size:9px;
letter-spacing:2px;
text-transform:uppercase;
color:#8B6555;
font-weight:700;
margin-bottom:5px;
}

.fld input,
.fld select,
.fld textarea{
width:100%;
padding:11px 13px;
border:1.5px solid #DDD0BB;
border-radius:8px;
font-size:14px;
background:#fff;
outline:none;
}

.img-upload-area{
border:2px dashed #DDD0BB;
border-radius:12px;
padding:20px;
text-align:center;
cursor:pointer;
background:#fff;
position:relative;
overflow:hidden;
}

.img-upload-area input[type=file]{
position:absolute;
inset:0;
opacity:0;
width:100%;
height:100%;
cursor:pointer;
z-index:10;
}

.img-upload-placeholder{
pointer-events:none;
}

#img-preview{
display:none;
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.img-remove-btn{
display:none;
position:absolute;
top:10px;
right:10px;
width:30px;
height:30px;
border:none;
border-radius:50%;
background:rgba(0,0,0,.6);
color:#fff;
font-size:14px;
z-index:20;
}

.img-remove-btn.visible{
display:block;
}

.modal-btns{
display:flex;
gap:10px;
margin-top:16px;
}

.modal-btns button{
flex:1;
padding:13px;
border-radius:6px;
font-size:11px;
letter-spacing:1.5px;
text-transform:uppercase;
font-weight:700;
border:none;
}

.btn-save{
background:#5C1A1A;
color:#fff;
}

.btn-cancel{
background:transparent;
border:2px solid #5C1A1A !important;
color:#5C1A1A;
}

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#2C1810;
color:#fff;
padding:12px 20px;
border-radius:8px;
font-size:13px;
font-weight:600;
opacity:0;
transition:.3s;
z-index:9999;
}

.toast.show{
opacity:1;
}
</style>

<body>

<div id="login-screen">
<div class="login-box">
<div class="brand">Koila Baba <span>Crochet</span></div>

<span class="sub-label">Admin Dashboard</span>

<label class="field-label">Password</label>

<input class="field-input" type="password" id="pw-input">

<button class="btn-login" id="login-btn">
Access Dashboard
</button>
</div>
</div>

<div id="panel-screen">

<div class="admin-topbar">
<div class="brand" style="color:#fff;">
Koila Baba <span>Crochet</span>
</div>
</div>

<div class="admin-body">

<div class="page-title">
Dashboard
</div>

<div class="section-card">

<div class="actions-col">
<button class="act-btn act-add" id="btn-add-product">
+ Add New Product
</button>
</div>

</div>

<div class="section-card">

<div id="recent-list"></div>

</div>

</div>
</div>

<div class="overlay" id="modal-overlay">

<div class="modal-box">

<h3 style="margin-bottom:18px;">
Add Product
</h3>

<input type="hidden" id="edit-id">

<div class="fld">
<label>Product Image</label>

<div class="img-upload-area" id="img-upload-area">

<input type="file" id="f-image" accept="image/*">

<button type="button" class="img-remove-btn" id="img-remove-btn">
✕
</button>

<div class="img-upload-placeholder" id="img-placeholder">
📷 Upload Image
</div>

<img id="img-preview">

</div>
</div>

<div class="fld">
<label>Product Name</label>
<input type="text" id="f-name">
</div>

<div class="fld">
<label>Emoji</label>
<input type="text" id="f-emoji">
</div>

<div class="fld">
<label>Price</label>
<input type="number" id="f-price">
</div>

<div class="fld">
<label>Category</label>

<select id="f-cat">
<option value="characters">Characters</option>
<option value="bouquet">Bouquet</option>
<option value="bags">Bags</option>
</select>

</div>

<div class="fld">
<label>Description</label>
<textarea id="f-desc"></textarea>
</div>

<div class="modal-btns">

<button class="btn-cancel" id="modal-cancel">
Cancel
</button>

<button class="btn-save" id="modal-save">
Save Product
</button>

</div>

</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){

var PASSWORD='234123';
var STORE_KEY='kbc_products';
var pendingImage=null;

function toast(msg){
var t=document.getElementById('toast');

t.textContent=msg;

t.classList.add('show');

setTimeout(function(){
t.classList.remove('show');
},2500);
}

function getProducts(){

try{
var s=localStorage.getItem(STORE_KEY);

if(s) return JSON.parse(s);

}catch(e){}

return [];
}

function saveProducts(arr){
localStorage.setItem(STORE_KEY,JSON.stringify(arr));
}

function renderList(){

var products=getProducts();

var c=document.getElementById('recent-list');

if(!products.length){
c.innerHTML='<p>No products yet.</p>';
return;
}

c.innerHTML=products.map(function(p){

return `
<div class="prod-row">

<div class="prod-thumb">
${p.image
? `<img src="${p.image}">`
: p.emoji}
</div>

<div class="prod-info">
<h4>${p.name}</h4>
<div class="prod-price">₹${p.price}</div>
</div>

</div>
`;

}).join('');
}

function handleImageFile(file){

if(!file) return;

if(!file.type.startsWith('image/')){
toast('Upload valid image');
return;
}

if(file.size > 5*1024*1024){
toast('Max image size 5MB');
return;
}

var reader=new FileReader();

reader.onload=function(e){

pendingImage=e.target.result;

var preview=document.getElementById('img-preview');
var placeholder=document.getElementById('img-placeholder');
var removeBtn=document.getElementById('img-remove-btn');

preview.src=pendingImage;

preview.style.display='block';

placeholder.style.display='none';

removeBtn.classList.add('visible');
};

reader.onerror=function(){
toast('Image failed');
};

reader.readAsDataURL(file);
}

function clearImage(){

pendingImage=null;

document.getElementById('img-preview').src='';

document.getElementById('img-preview').style.display='none';

document.getElementById('img-placeholder').style.display='block';

document.getElementById('img-remove-btn').classList.remove('visible');

document.getElementById('f-image').value='';
}

function openModal(){

document.getElementById('modal-overlay').classList.add('show');

clearImage();
}

function closeModal(){

document.getElementById('modal-overlay').classList.remove('show');
}

function saveProduct(){

var products=getProducts();

products.push({
id:Date.now(),
name:document.getElementById('f-name').value,
emoji:document.getElementById('f-emoji').value,
price:document.getElementById('f-price').value,
category:document.getElementById('f-cat').value,
description:document.getElementById('f-desc').value,
image:pendingImage || ''
});

saveProducts(products);

closeModal();

renderList();

toast('Product added ✓');
}

document.addEventListener('DOMContentLoaded',function(){

document.getElementById('login-btn').onclick=function(){

if(document.getElementById('pw-input').value===PASSWORD){

document.getElementById('login-screen').style.display='none';

document.getElementById('panel-screen').style.display='block';

renderList();

}else{
toast('Wrong password');
}

};

document.getElementById('btn-add-product')
.addEventListener('click',openModal);

document.getElementById('modal-cancel')
.addEventListener('click',closeModal);

document.getElementById('modal-save')
.addEventListener('click',saveProduct);

document.getElementById('f-image')
.addEventListener('change',function(e){

handleImageFile(e.target.files[0]);

});

document.getElementById('img-remove-btn')
.addEventListener('click',function(e){

e.stopPropagation();

clearImage();

});

});
})();
</script>

</body>

reader.onload=function(e){

pendingImage=e.target.result;

var preview=document.getElementById('img-preview');
var placeholder=document.getElementById('img-placeholder');
var removeBtn=document.getElementById('img-remove-btn');

preview.src=pendingImage;

preview.style.display='block';

placeholder.style.display='none';

removeBtn.classList.add('visible');
};

reader.onerror=function(){
toast('Image failed');
};

reader.readAsDataURL(file);
}

function clearImage(){

pendingImage=null;

document.getElementById('img-preview').src='';

document.getElementById('img-preview').style.display='none';

document.getElementById('img-placeholder').style.display='block';

document.getElementById('img-remove-btn').classList.remove('visible');

document.getElementById('f-image').value='';
}

function openModal(){

document.getElementById('modal-overlay').classList.add('show');

clearImage();
}

function closeModal(){

document.getElementById('modal-overlay').classList.remove('show');
}

function saveProduct(){

var products=getProducts();

products.push({
id:Date.now(),
name:document.getElementById('f-name').value,
emoji:document.getElementById('f-emoji').value,
price:document.getElementById('f-price').value,
category:document.getElementById('f-cat').value,
description:document.getElementById('f-desc').value,
image:pendingImage || ''
});

saveProducts(products);

closeModal();

renderList();

toast('Product added ✓');
}

document.addEventListener('DOMContentLoaded',function(){

document.getElementById('login-btn').onclick=function(){

if(document.getElementById('pw-input').value===PASSWORD){

document.getElementById('login-screen').style.display='none';

document.getElementById('panel-screen').style.display='block';

renderList();

}else{
toast('Wrong password');
}

};

document.getElementById('btn-add-product')
.addEventListener('click',openModal);

document.getElementById('modal-cancel')
.addEventListener('click',closeModal);

document.getElementById('modal-save')
.addEventListener('click',saveProduct);

document.getElementById('f-image')
.addEventListener('change',function(e){

handleImageFile(e.target.files[0]);

});

document.getElementById('img-remove-btn')
.addEventListener('click',function(e){

e.stopPropagation();

clearImage();

});

});
})();
</script>

</body>
</html>
